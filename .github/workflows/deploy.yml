name: Deploy Laravel Fast

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql, zip, gd

      # Install composer
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # Create ZIP
      - name: Create deployment zip
        run: zip -r deployhrm.zip . \
          -x ".git/*" "node_modules/*" "tests/*" ".github/*" ".env" "storage/*" \
             "phpunit.xml" "README.md" ".editorconfig"

      # Upload zip
      - name: Upload package to hosting
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deployhrm.zip"
          target: "/home/aduyhungiovn/"

      # SSH + unzip + optimize
      - name: Deploy and run artisan commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/aduyhungiovn/hrm.duyhung.io.vn

            # Giải nén code mới
            unzip -o ../deployhrm.zip

            # Xóa file zip sau deploy
            rm ../deployhrm.zip

            # Storage — giữ nguyên, không bị ghi đè
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            chmod -R 775 storage bootstrap/cache

            # Nếu không có .env thì copy .env.example
            [ ! -f .env ] && cp .env.example .env

            # Laravel optimize
            php artisan key:generate --force || true
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Database migrate
            php artisan migrate --force
