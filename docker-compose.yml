# Docker Compose cho Laravel - Quản Lý Nhân Sự
# Version: 1.0.0

services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: qlns-app
    container_name: qlns-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - qlns-network
    depends_on:
      - mysql
      - redis

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: qlns-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - qlns-network
    depends_on:
      - app

  # MySQL Service
  mysql:
    image: mysql:8.0
    container_name: qlns-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-doan_thuchanh_php}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - qlns-network

  # Redis Service (cho cache và session)
  redis:
    image: redis:alpine
    container_name: qlns-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - qlns-network

  # phpMyAdmin Service (tùy chọn - quản lý database)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: qlns-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    networks:
      - qlns-network
    depends_on:
      - mysql

  # Node.js Service (cho Vite build)
  node:
    image: node:20-alpine
    container_name: qlns-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    networks:
      - qlns-network
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev

# Networks
networks:
  qlns-network:
    driver: bridge

# Volumes
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
